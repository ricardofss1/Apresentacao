<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca de Apresentações</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --accent:#2563eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.search{
    width:100%;
    max-width:600px;
    display:block;
    margin:0 auto 30px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.thumb{
    height:180px;
    background:#fff;
}

.thumb iframe{
    width:100%;
    height:100%;
    border:none;
    pointer-events:none;
}

.content{
    padding:15px;
}

.title{
    font-size:18px;
    margin-bottom:10px;
}

.actions{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    text-align:center;
    text-decoration:none;
    background:var(--accent);
    color:white;
    padding:10px;
    border-radius:8px;
}
</style>
</head>
<body>

<h1>📚 Biblioteca de Apresentações</h1>

<input
    class="search"
    id="search"
    placeholder="Pesquisar apresentação..."
>

<div class="grid" id="grid"></div>

<script>

let presentations = [];

async function loadPresentations() {

    const response = await fetch('presentations.json');
    presentations = await response.json();

    render(presentations);
}

function render(list) {

    const grid = document.getElementById('grid');

    grid.innerHTML = '';

    list.forEach(item => {

        grid.innerHTML += `
        <div class="card">

            <div class="thumb">
                <iframe
                    src="${item.file}#page=1&zoom=50">
                </iframe>
            </div>

            <div class="content">

                <div class="title">
                    ${item.title}
                </div>

                <div class="actions">

                    <a
                      class="btn"
                      href="${item.file}"
                      target="_blank">
                      Abrir
                    </a>

                    <a
                      class="btn"
                      href="viewer.html?pdf=${encodeURIComponent(item.file)}">
                      Apresentar
                    </a>

                </div>

            </div>

        </div>
        `;
    });
}

document
.getElementById('search')
.addEventListener('input', e => {

    const term = e.target.value.toLowerCase();

    render(
        presentations.filter(p =>
            p.title.toLowerCase().includes(term)
        )
    );

});

loadPresentations();

</script>

</body>
</html>
